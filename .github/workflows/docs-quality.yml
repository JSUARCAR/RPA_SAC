# ==============================================================================
# GitHub Actions Workflow: Documentation Quality Gates
# Proyecto: SAC Automation RPA
# Purpose: Validar calidad de documentación en CI/CD
# ==============================================================================

name: Documentation Quality Gates

on:
  push:
    branches: [main, develop]
    paths:
      - 'core/**'
      - 'src/**'
      - '.github/workflows/docs-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'core/**'
      - 'src/**'

env:
  PYTHON_VERSION: '3.12'
  MIN_COVERAGE: 90

jobs:
  # Job 1: Docstring Coverage Check
  docstring-coverage:
    name: Docstring Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install interrogate

      - name: Run docstring coverage
        run: |
          interrogate core/ src/ \
            --ignore-init-method \
            --fail-under=${{ env.MIN_COVERAGE }} \
            --verbose

      - name: Generate coverage report
        if: always()
        run: |
          interrogate core/ src/ \
            --ignore-init-method \
            --verbose 2>&1 | tee coverage_report.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docstring-coverage-report
          path: coverage_report.txt
          retention-days: 30

  # Job 2: Pydocstyle Linting
  pydocstyle-check:
    name: Pydocstyle Linting
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pydocstyle

      - name: Run pydocstyle
        run: |
          pydocstyle core/ src/ \
            --convention=numpy \
            --add-ignore=D100,D203,D213 || true

      - name: Check for critical errors
        run: |
          ERRORS=$(pydocstyle core/ src/ \
            --convention=numpy \
            --add-ignore=D100,D203,D213 2>&1 | grep -c "D4" || true)
          echo "Critical pydocstyle errors: $ERRORS"
          if [ "$ERRORS" -gt 10 ]; then
            echo "Too many critical documentation errors"
            exit 1
          fi

  # Job 3: Type Checking
  type-check:
    name: Type Hints Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install mypy types-openpyxl

      - name: Run mypy
        run: |
          mypy core/ src/ \
            --ignore-missing-imports \
            --no-error-summary || true

  # Job 4: Custom Validation Script
  custom-validation:
    name: Custom Documentation Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install docstring-parser

      - name: Run custom validation
        run: |
          python scripts/validate_docs.py || true

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validation-results
          path: docs/validation_results.json
          retention-days: 30

  # Job 5: Summary Report
  summary:
    name: Documentation Summary
    runs-on: ubuntu-latest
    needs: [docstring-coverage, pydocstyle-check]
    
    steps:
      - name: Generate summary
        run: |
          echo "## Documentation Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed:" >> $GITHUB_STEP_SUMMARY
          echo "- Docstring Coverage: interrogate" >> $GITHUB_STEP_SUMMARY
          echo "- Docstring Style: pydocstyle (NumPy convention)" >> $GITHUB_STEP_SUMMARY
          echo "- Type Hints: mypy" >> $GITHUB_STEP_SUMMARY
          echo "- Custom Validation: scripts/validate_docs.py" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Target Metrics:" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: ${{ env.MIN_COVERAGE }}%" >> $GITHUB_STEP_SUMMARY
          echo "- Style: NumPy Docstring Convention" >> $GITHUB_STEP_SUMMARY
